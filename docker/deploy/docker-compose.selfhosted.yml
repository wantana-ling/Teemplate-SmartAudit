# ============================================================================
# SmartAIAudit — Self-hosted Supabase Override
# ============================================================================
# Activated with:
#   docker compose -f docker-compose.yml -f docker-compose.selfhosted.yml \
#     --profile supabase up -d
# ============================================================================

services:
  backend:
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      - SUPABASE_PROJECT_URL=http://supabase-rest:3000

  supabase-db:
    image: supabase/postgres:15.6.1.143
    profiles: [supabase]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
    volumes:
      - supabase-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    profiles: [supabase]
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  supabase-auth:
    image: supabase/gotrue:v2.158.1
    profiles: [supabase]
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${APP_URL:-http://localhost:8080}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_DISABLE_SIGNUP: "true"
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  supabase-storage:
    image: supabase/storage-api:v1.11.13
    profiles: [supabase]
    environment:
      ANON_KEY: ${SUPABASE_PUBLISHABLE_API_KEY}
      SERVICE_KEY: ${SUPABASE_SECRET_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_JWT_SECRET: ${JWT_SECRET}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
    volumes:
      - supabase-storage:/var/lib/storage
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  supabase-db:
  supabase-storage:
