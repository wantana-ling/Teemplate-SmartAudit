  #   ports:
  #     - "2222:22"
  #   networks:
  #     - smartaiaudit

  # VNC Test Server
  # vnc-server:
  #   build:
  #     context: ./test-servers/vnc
  #     dockerfile: Dockerfile
  #   container_name: smartaiaudit-vnc-server
  #   restart: unless-stopped
  #   ports:
  #     - "5901:5901"
  #   environment:
  #     - VNC_PASSWORD=password
  #   networks:
  #     - smartaiaudit

  # RDP Test Server
  # rdp-server:
  #   build:
  #     context: ./test-servers/rdp
  #     dockerfile: Dockerfile
  #   container_name: smartaiaudit-rdp-server
  #   restart: unless-stopped
  #   ports:
  #     - "3389:3389"
