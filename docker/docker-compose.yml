services:
  # Guacd - Apache Guacamole proxy daemon
  guacd:
    image: guacamole/guacd:latest
    container_name: smartaiaudit-guacd
    restart: unless-stopped
    ports:
      - "4822:4822"
    volumes:
      - ./recordings:/recordings
    environment:
      - GUACD_LOG_LEVEL=info
      - GUACD_RECORDING_PATH=/recordings
      - GUACD_RECORDING_MAX_TIME=3600  # 1 hour max recording time
      - GUACD_RECORDING_IGNORE_CERT_ERRORS=true
    networks:
      - smartaiaudit

  # Test Servers (commented out for faster startup)
  # SSH Test Server
  # ssh-server:
